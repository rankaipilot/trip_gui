<h1 mat-dialog-title>
    @if (isNew) {
        New {{ getCaption() }} Record
    } @else {
        {{ getCaption() }} Details
    }
</h1>
<div mat-dialog-content>
    <record-form [tableName]="tableName" [record]="editableRecord" [isReadOnly]="isReadOnlyBound"></record-form>
</div>
<div mat-dialog-actions align="end">
    <button mat-raised-button class="primary" type="submit" (click)="onSave()">Save</button>
    <button mat-button type="button" (click)="onCancel()">Cancel</button>
</div>

@if (isLookupTableSearch()) {
    <mat-form-field [appearance]="appearance()" [subscriptSizing]="subscriptSizing()">
        <mat-label>{{ colCaption(field()) }}</mat-label>
        <input matInput [value]="value()" [required]="required" [readonly]="readonlyField()">
        <button mat-icon-button matSuffix (click)="openLookup()" [disabled]="readonlyField()">
            <mat-icon>search</mat-icon>
        </button>
    </mat-form-field>
} @else if (inputType === 'select') {
    <mat-form-field [appearance]="appearance()" [subscriptSizing]="subscriptSizing()">
        <mat-label>{{ colCaption(field()) }}</mat-label>
        <mat-select [value]="value()" (selectionChange)="onSelectChange($event);" [disabled]="readonlyField()">
            @for (option of options; track option.Value) {
                <mat-option [value]="option.Value">{{option.Caption}}</mat-option>
            }
        </mat-select>
    </mat-form-field>
} @else if (inputType === 'checkbox') {
    <mat-checkbox [checked]="value() === '1'" (change)="onCheckboxChange($event);" [disabled]="readonlyField()">{{ colCaption(field()) }}</mat-checkbox>
} @else {
    <mat-form-field [appearance]="appearance()" [subscriptSizing]="subscriptSizing()">
        <mat-label>{{ colCaption(field()) }}</mat-label>
        <input matInput
         [type]="inputType"
         [value]="value()"
         (input)="onInputChange($event);"
         [disabled]="readonlyField()"
         [required]="required"
         [attr.maxLength]="maxLength"
         [attr.step]="step">
    </mat-form-field>
}

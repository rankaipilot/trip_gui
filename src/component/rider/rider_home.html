<div class="page-container">
    <div class="map-container" role="img" aria-label="Map showing your current location">
        <div style="display:flex;align-items:center;justify-content:center;height:100%;background:var(--trip-surface-variant);">
            <mat-icon style="font-size:48px;width:48px;height:48px;color:var(--trip-on-surface-hint);">map</mat-icon>
        </div>
    </div>

    <mat-card class="booking-card" (click)="navigateToBooking()">
        <mat-card-content>
            <mat-icon>search</mat-icon>
            <span>Where to?</span>
        </mat-card-content>
    </mat-card>
</div>

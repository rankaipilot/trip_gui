<div class="page-container">
    <h2>Book a Ride</h2>

    <mat-form-field appearance="outline" class="full-width">
        <mat-label>Pickup Location</mat-label>
        <input matInput [value]="pickupAddress()" (input)="pickupAddress.set($any($event.target).value)">
        <mat-icon matPrefix>trip_origin</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
        <mat-label>Dropoff Location</mat-label>
        <input matInput [value]="dropoffAddress()" (input)="dropoffAddress.set($any($event.target).value)">
        <mat-icon matPrefix>place</mat-icon>
    </mat-form-field>

    <h3>Select Ride Type</h3>
    <div style="display:flex;gap:8px;overflow-x:auto;padding:8px 0;">
        @for (type of rideTypes; track type) {
            <ride-type-card
                [rideType]="type"
                [selected]="selectedRideType() === type"
                [estimate]="getEstimate(type)?.estimatedFare ?? null"
                [eta]="getEstimate(type)?.etaMinutes ?? null"
                (select)="selectRideType($event)" />
        }
    </div>

    @if (selectedEstimate(); as est) {
        <mat-card style="margin-top:16px;">
            <mat-card-header><mat-card-title>Fare Estimate</mat-card-title></mat-card-header>
            <mat-card-content>
                <fare-breakdown [fareItems]="est.fareItems" [total]="est.estimatedFare" />
            </mat-card-content>
        </mat-card>
    }

    <button mat-raised-button class="primary" class="full-width" style="margin-top:16px;" (click)="confirmBooking()">
        Confirm Booking
    </button>
</div>

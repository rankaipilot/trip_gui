<div class="login-page">
    <div class="gradient-hero">
        <h1>Create Account</h1>
        <p>Join TRIPMAN today</p>
    </div>
    <mat-card class="login-card">
        <mat-card-content>
            @if (errorMessage()) {
                <p class="error-text">{{ errorMessage() }}</p>
            }
            @if (successMessage()) {
                <p class="success-text">{{ successMessage() }}</p>
            }
            <form [formGroup]="registerForm" (ngSubmit)="register()">
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>First Name</mat-label>
                    <input matInput formControlName="FirstName">
                </mat-form-field>
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Last Name</mat-label>
                    <input matInput formControlName="LastName">
                </mat-form-field>
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Email</mat-label>
                    <input matInput formControlName="Email" type="email" autocomplete="email">
                </mat-form-field>
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Phone</mat-label>
                    <input matInput formControlName="Phone" type="tel">
                </mat-form-field>
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Password</mat-label>
                    <input matInput formControlName="Password" type="password" autocomplete="new-password">
                </mat-form-field>
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Confirm Password</mat-label>
                    <input matInput formControlName="ConfirmPassword" type="password">
                </mat-form-field>
                <button mat-raised-button color="primary" type="submit" class="full-width" [disabled]="registerForm.invalid">
                    Create Account
                </button>
            </form>
        </mat-card-content>
        <mat-card-actions align="end">
            <a mat-button routerLink="/login">Already have an account? Sign In</a>
        </mat-card-actions>
    </mat-card>
</div>

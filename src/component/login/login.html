<div class="login-page">
    <div class="gradient-hero">
        <img ngSrc="trip_logo.png" alt="TRIPMAN" width="80" height="80" priority>
        <h1>TRIPMAN</h1>
        <p>Your ride, your way</p>
    </div>
    <mat-card class="login-card">
        <mat-card-header>
            <mat-card-title>Sign In</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <form [formGroup]="loginForm" (ngSubmit)="login()">
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Email or Phone</mat-label>
                    <input matInput formControlName="username" autocomplete="username">
                    <mat-icon matPrefix>person</mat-icon>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Password</mat-label>
                    <input matInput formControlName="password" type="password" autocomplete="current-password">
                    <mat-icon matPrefix>lock</mat-icon>
                </mat-form-field>

                <button mat-raised-button color="primary" type="submit" class="full-width" [disabled]="loginForm.invalid">
                    Sign In
                </button>
            </form>
        </mat-card-content>
        <mat-card-actions align="end">
            <a mat-button routerLink="/forgot-password">Forgot Password?</a>
            <a mat-button routerLink="/register" color="accent">Create Account</a>
        </mat-card-actions>
    </mat-card>
</div>
